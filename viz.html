<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nimarko Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f13; color: #e0e0e0; min-height: 100vh; padding: 32px 24px; }
  h1 { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 8px; }
  .subtitle { color: #666; font-size: 14px; margin-bottom: 40px; }
  .section { margin-bottom: 48px; }
  .section-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: #555; margin-bottom: 16px; }

  /* STREAKS */
  .streaks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .streak-card { background: #1a1a22; border-radius: 14px; padding: 18px 20px; border: 1px solid #2a2a35; position: relative; overflow: hidden; }
  .streak-card.active { border-color: #ff6b2b44; }
  .streak-card.active::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #ff6b2b, #ff9a5c); }
  .streak-card.expired { opacity: 0.55; }
  .streak-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .streak-name { font-size: 16px; font-weight: 600; color: #fff; }
  .streak-badge { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; }
  .badge-active { background: #ff6b2b22; color: #ff8c55; border: 1px solid #ff6b2b44; }
  .badge-expired { background: #ffffff0a; color: #555; border: 1px solid #2a2a35; }
  .streak-days { font-size: 36px; font-weight: 800; color: #ff6b2b; line-height: 1; margin-bottom: 4px; }
  .streak-days-label { font-size: 12px; color: #555; margin-bottom: 14px; }
  .streak-meta { font-size: 12px; color: #444; }
  .streak-meta span { color: #666; }
  .flame { font-size: 20px; }

  /* CALENDAR DOTS */
  .cal-row { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 10px; }
  .dot { width: 8px; height: 8px; border-radius: 2px; background: #2a2a35; }
  .dot.me { background: #ff6b2b; }
  .dot.partner { background: #5b8fff; }
  .dot.both { background: #a855f7; }

  /* API */
  .api-group { margin-bottom: 20px; }
  .api-group-name { font-size: 13px; font-weight: 600; color: #5b8fff; margin-bottom: 8px; }
  .api-item { background: #1a1a22; border-radius: 10px; padding: 12px 16px; border: 1px solid #2a2a35; margin-bottom: 6px; display: flex; align-items: center; gap: 12px; }
  .method { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; min-width: 48px; text-align: center; }
  .GET { background: #22c55e22; color: #4ade80; border: 1px solid #22c55e33; }
  .POST { background: #3b82f622; color: #60a5fa; border: 1px solid #3b82f633; }
  .DELETE { background: #ef444422; color: #f87171; border: 1px solid #ef444433; }
  .api-path { font-size: 13px; color: #ccc; font-family: 'SF Mono', monospace; }
  .api-name { font-size: 12px; color: #555; margin-left: auto; }

  .legend { display: flex; gap: 16px; margin-top: 8px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #555; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
</style>
</head>
<body>

<h1>Nimarko Dashboard</h1>
<p class="subtitle">Визуализация данных проекта</p>

<!-- STREAKS -->
<div class="section">
  <div class="section-title">Огоньки (Streaks)</div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#ff6b2b"></div> Я</div>
    <div class="legend-item"><div class="legend-dot" style="background:#5b8fff"></div> Партнёр</div>
    <div class="legend-item"><div class="legend-dot" style="background:#a855f7"></div> Оба</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2a2a35"></div> Нет</div>
  </div>
  <br>
  <div class="streaks-grid" id="streaks"></div>
</div>

<!-- API -->
<div class="section">
  <div class="section-title">API Collection</div>
  <div id="api"></div>
</div>

<script>
const collect = {"item":[{"name":"Auth","item":[{"name":"Register User","request":{"method":"POST","url":{"raw":"{{baseUrl}}/auth/register?user_id={{userId}}"}}}]},{"name":"User Stats","item":[{"name":"Get Stats","request":{"method":"GET","url":{"raw":"{{baseUrl}}/user/{{userId}}"}}},{"name":"Sync Stats","request":{"method":"POST","url":{"raw":"{{baseUrl}}/sync"}}},{"name":"Delete All Progress","request":{"method":"DELETE","url":{"raw":"{{baseUrl}}/user/{{userId}}/stats"}}}]},{"name":"Streaks (Огоньки)","item":[{"name":"Get All Streaks","request":{"method":"GET","url":{"raw":"{{baseUrl}}/streaks/{{userId}}"}}},{"name":"Streak Message Update","request":{"method":"POST","url":{"raw":"{{baseUrl}}/streak/message"}}},{"name":"Restore Streak","request":{"method":"POST","url":{"raw":"{{baseUrl}}/streak/restore"}}},{"name":"Delete Specific Streak","request":{"method":"DELETE","url":{"raw":"{{baseUrl}}/streak/{{userId}}/12345678"}}}]},{"name":"Badges & External","item":[{"name":"Get Global Badges","request":{"method":"GET","url":{"raw":"https://badges.ettacent.dev/api/v1/badges"}}},{"name":"Check Update","request":{"method":"GET","url":{"raw":"https://update.ettacent.dev/api/plugin-version?id=achievements"}}}]}]};

function renderStreaks(streaks) {
  const streaksEl = document.getElementById('streaks');
  streaksEl.innerHTML = '';
  const sorted = Object.values(streaks).sort((a,b) => b.streak_days - a.streak_days);
  sorted.forEach(s => {
    const mySet = new Set(s.my_message_dates);
    const pSet = new Set(s.partner_message_dates);
    const allDates = [...new Set([...s.my_message_dates, ...s.partner_message_dates])].sort().slice(-30);
    const dots = allDates.map(d => {
      const m = mySet.has(d), p = pSet.has(d);
      const cls = m && p ? 'both' : m ? 'me' : 'partner';
      return `<div class="dot ${cls}" title="${d}"></div>`;
    }).join('');
    const card = document.createElement('div');
    card.className = `streak-card ${s.is_active ? 'active' : 'expired'}`;
    card.innerHTML = `
      <div class="streak-header">
        <div class="streak-name">${s.partner_name || '—'}</div>
        <div class="streak-badge ${s.is_active ? 'badge-active' : 'badge-expired'}">${s.is_active ? 'активен' : 'истёк'}</div>
      </div>
      <div class="streak-days">${s.streak_days > 0 ? '🔥' : ''} ${s.streak_days}</div>
      <div class="streak-days-label">дней подряд</div>
      <div class="cal-row">${dots}</div>
      ${s.expired_at ? `<div class="streak-meta" style="margin-top:10px">Истёк: <span>${s.expired_at}</span></div>` : ''}
      ${s.restore_count > 0 ? `<div class="streak-meta">Восстановлений: <span>${s.restore_count}</span></div>` : ''}
    `;
    streaksEl.appendChild(card);
  });
}

Promise.all([
  fetch('original.json').then(r => r.json()),
  fetch('current.json').then(r => r.json())
]).then(([orig, curr]) => {
  const merged = {...orig.streaks, ...curr.streaks};
  renderStreaks(merged);
});

// Render API
const apiEl = document.getElementById('api');
collect.item.forEach(group => {
  const div = document.createElement('div');
  div.className = 'api-group';
  div.innerHTML = `<div class="api-group-name">${group.name}</div>` +
    group.item.map(req => {
      const url = req.request.url.raw.replace('{{baseUrl}}', '/api/v1').replace('{{userId}}', ':userId');
      return `<div class="api-item">
        <span class="method ${req.request.method}">${req.request.method}</span>
        <span class="api-path">${url}</span>
        <span class="api-name">${req.name}</span>
      </div>`;
    }).join('');
  apiEl.appendChild(div);
});
</script>
</body>
</html>
